<!DOCTYPE html>
<html>
<head>
    <title>Payment - DevSecOps Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto mt-10 max-w-2xl bg-white p-8 shadow rounded-lg">
        <h2 class="text-3xl font-bold mb-8 border-bottom pb-4 text-gray-800">Payment Information</h2>
        <form action="/checkout" method="POST" class="space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Fullname</label>
                    <input type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Phone</label>
                    <input type="text" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Address</label>
                <textarea rows="3" class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>
            <div class="bg-blue-50 p-4 rounded-md">
                <p class="text-sm text-blue-800">Method: <strong>Paying hand to hand (COD)</strong></p>
            </div>
            <div class="flex justify-between items-center pt-6">
                <a href="/dashboard" class="text-gray-600 hover:underline">Back</a>
                <button type="submit" class="bg-orange-500 text-white px-8 py-3 rounded-lg font-bold hover:bg-orange-600 transition shadow-lg">Confirm Order</button>
            </div>
        </form>
    </div>
</body>
</html>
