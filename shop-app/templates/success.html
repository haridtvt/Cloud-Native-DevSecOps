<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - DevSecOps Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-lg text-center">
        <div class="mb-6 flex justify-center">
            <div class="bg-green-100 p-4 rounded-full">
                <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Success!</h1>
        <p class="text-gray-600 mb-8">Your order has been received. Our DevTeam will contact you shortly to arrange delivery.</p>

        <div class="space-y-3">
            <a href="/dashboard" class="block w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-md">
                Continue Shopping
            </a>
            <p class="text-xs text-gray-400">Order ID: #DEVSEC-{{ range(1000, 9999) | random }}</p>
        </div>
    </div>
</body>
</html>
